name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Rust tests
  rust-test:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Rust Tests
          - os: macos-latest
            label: Rust Tests (macos-latest)
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust MSRV
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install Rust test toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Install Rust formatting toolchain
        if: runner.os == 'Linux'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          protoc --version

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Is Cargo.lock consistent with Cargo.toml?
        run: cargo +1.95.0 fetch --locked

      - name: Run cargo fmt check
        if: runner.os == 'Linux'
        run: cargo +stable fmt --all -- --check

      - name: Run cargo check
        run: cargo +1.95.0 check

      - name: Run cargo check (explicitly without dynamic-inputs)
        run: cargo +1.95.0 check --no-default-features

      - name: Run cargo check (onnx-runtime without dynamic-inputs)
        run: cargo +1.95.0 check --no-default-features --features onnx-runtime

      - name: Run cargo check (TensorRT)
        if: runner.os == 'Linux'
        run: cargo +1.95.0 check -F trtx-runtime

      - name: Run cargo check (LiteRT)
        if: runner.os == 'Linux'
        run: cargo +1.95.0 check --features litert-runtime

      - name: Run cargo check (CoreML)
        if: runner.os == 'macOS'
        run: cargo +1.95.0 check --features coreml-runtime

      - name: Run cargo test (library only)
        run: cargo +1.96.0 test --lib

      - name: Run cargo test (library only, CoreML)
        if: runner.os == 'macOS'
        run: cargo +1.96.0 test --lib --features coreml-runtime

      - name: Check backend operator report is up to date
        if: runner.os == 'Linux'
        run: |
          python3 scripts/generate_backend_operator_report.py --check

      - name: Run backend operator report parser tests
        if: runner.os == 'Linux'
        run: |
          python3 -m unittest scripts/test_generate_backend_operator_report.py

  wpt-conformance:
    name: WPT Conformance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # macOS/CoreML results vary across machines (e.g. M1 runner vs M5 dev), so its
    # leg is optional and never blocks the PR; it publishes a report artifact instead.
    continue-on-error: ${{ matrix.optional || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            wpt_command: make test-wpt
          - os: macos-latest
            wpt_command: make test-wpt-coreml-report
            optional: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Cache WPT checkout
        uses: actions/cache@v4
        with:
          path: .cache/wpt
          key: wpt-${{ runner.os }}-${{ hashFiles('scripts/fetch_wpt.mjs') }}
          restore-keys: |
            wpt-${{ runner.os }}-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-wpt-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Fetch WPT corpus
        run: node scripts/fetch_wpt.mjs

      - name: Run WPT conformance tests
        env:
          WPT_REPORT_JSON: reports/wpt-conformance.json
          RUSTNN_GIT_SHA: ${{ github.sha }}
          RUSTNN_GIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: ${{ matrix.wpt_command }}

      - name: Upload WPT conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-conformance-report-${{ matrix.os }}
          path: |
            reports/wpt-conformance.json
            reports/wpt-conformance.html

  # Legacy rustnnpt gate: keeps branch protection happy until "RustNNPT Conformance Gate"
  # is replaced with "WPT Conformance" in repo settings. Remove once admins update checks.
  rustnnpt-gate:
    name: RustNNPT Conformance Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout rustnn
        uses: actions/checkout@v4
        with:
          path: rustnn

      - name: Checkout rustnnpt
        uses: actions/checkout@v4
        with:
          repository: rustnn/rustnnpt
          ref: main
          path: rustnnpt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Refresh WPT cache
        working-directory: rustnnpt
        run: npm run test:wpt:fetch

      - name: Pin rustnnpt to this PR rustnn SHA
        working-directory: rustnnpt
        run: |
          cargo update -p rustnn --precise "${{ github.event.pull_request.head.sha }}"

      - name: Download ONNX Runtime shared libraries
        working-directory: rustnn
        run: |
          make onnxruntime-download
          ORT_LIB="$(find target/onnxruntime -type f \( -name 'libonnxruntime.so' -o -name 'libonnxruntime.so.*' -o -name 'libonnxruntime.dylib' -o -name 'onnxruntime.dll' \) | head -n 1)"
          if [ -z "$ORT_LIB" ]; then
            echo "Failed to locate ONNX Runtime dynamic library under rustnn/target/onnxruntime."
            exit 1
          fi
          ORT_LIB="$(realpath "$ORT_LIB")"
          ORT_DIR="$(dirname "$ORT_LIB")"
          echo "ORT_DYLIB_PATH=$ORT_LIB" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$ORT_DIR:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=$ORT_DIR:${DYLD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "PATH=$ORT_DIR:$PATH" >> "$GITHUB_ENV"

      - name: Run rustnnpt conformance (cpu)
        continue-on-error: true
        working-directory: rustnnpt
        run: npm run test:wpt:report -- --variants cpu

      - name: Enforce minimum pass rate
        working-directory: rustnnpt
        run: |
          if [ ! -f reports/conformance.json ]; then
            echo "reports/conformance.json missing after conformance run; rerunning with explicit report paths"
            npm run test:wpt:report -- --variants cpu --report-json reports/conformance.json --report-html reports/conformance.html || true
          fi
          if [ ! -f reports/conformance.json ]; then
            echo "Conformance report is still missing after rerun."
            exit 1
          fi
          PASS_RATE="$(jq -r '.summary.passRatePct // (if .summary.total > 0 then (.summary.passed * 100 / .summary.total) else 0 end)' reports/conformance.json)"
          echo "rustnnpt pass rate: ${PASS_RATE}%"
          awk -v p="$PASS_RATE" 'BEGIN { if (p + 0 < 90) { exit 1 } }'

      - name: Upload rustnnpt conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustnnpt-conformance-report
          path: rustnnpt/reports/conformance.json

  # Documentation build test
  docs-test:
    name: Test Documentation Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Build documentation
        run: mkdocs build --strict

  # Check that version in pyproject.toml matches git tag (for releases)
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Check version matches tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "Error: Tag version ($TAG) does not match pyproject.toml version ($VERSION)"
            exit 1
          fi
          echo "Version check passed: $VERSION"
